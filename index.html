<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فك الروابط</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(135deg, #120024, #1a0033);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        body::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .background-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, rgba(236, 72, 153, 0.1) 70%, transparent 100%);
            z-index: -1;
            filter: blur(80px);
            animation: pulseGlow 8s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }
        }

        .container {
            width: 90%;
            max-width: 850px;
            margin-top: 80px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 6s infinite alternate;
            background-size: 200% 200%;
            text-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .main-card {
            background: rgba(20, 10, 35, 0.65);
            border: 2px solid transparent;
            border-image: linear-gradient(45deg, #a855f7, #ec4899) 1;
            padding: 40px 30px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(168, 85, 247, 0.2);
            backdrop-filter: blur(20px);
            animation: borderAnimation 6s infinite alternate;
            background-size: 200% 200%;
            margin-bottom: 40px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 25px;
            background: rgba(10, 5, 20, 0.8);
            border: 2px solid #4a1d6d;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.4s ease;
            text-align: left;
            direction: ltr;
        }

        input[type="text"]:focus {
            border-color: #ec4899;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
            background: rgba(15, 5, 30, 0.9);
        }

        input[type="text"]::placeholder {
            text-align: right;
            direction: rtl;
            color: #6b7280;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(45deg, #a855f7, #ec4899);
            background-size: 200% 200%;
            transition: all 0.4s ease;
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4);
        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(236, 72, 153, 0.6);
            background-position: right center;
        }

        .btn-action:disabled {
            background: #2e1f3d;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loader-container {
            display: none;
            margin: 30px 0;
        }

        .loader-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ec4899;
            animation: pulseText 1.5s infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .result-section {
            display: none;
            width: 100%;
            margin-top: 20px;
            animation: fadeIn 0.6s ease forwards;
            text-align: right;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a855f7;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .code-container {
            position: relative;
            background: #090214;
            border: 2px solid #a855f7;
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
            max-height: 400px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        pre {
            color: #a7f3d0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            text-align: left;
            direction: ltr;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .btn-copy {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(45deg, #ec4899, #a855f7);
            background-size: 200% 200%;
            transition: all 0.4s ease;
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.4);
            margin-top: 10px;
            id: copyBtn;
        }

        .btn-copy:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(168, 85, 247, 0.6);
            background-position: right center;
        }

        .ladder-nav {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(20, 10, 35, 0.8);
            padding: 20px 10px;
            border-radius: 50px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .ladder-line {
            width: 4px;
            height: 80px;
            background: linear-gradient(to bottom, #a855f7, #ec4899);
            position: relative;
            border-radius: 2px;
        }

        .ladder-line::before, .ladder-line::after {
            content: '';
            position: absolute;
            left: -4px;
            width: 12px;
            height: 2px;
            background: #a855f7;
        }
        .ladder-line::before { top: 25px; background: #a855f7; }
        .ladder-line::after { bottom: 25px; background: #ec4899; }

        .ladder-btn {
            background: linear-gradient(45deg, #a855f7, #ec4899);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        .ladder-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.6);
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="ladder-nav" id="ladderNav">
        <button class="ladder-btn" onclick="scrollToTop()">▲</button>
        <div class="ladder-line"></div>
        <button class="ladder-btn" onclick="scrollToBottom()">▼</button>
    </div>

    <div class="container" id="topSection">
        <h1>فك الروابط</h1>
        <p class="subtitle">الموقع الأفخم والأسرع لفك تشفير الروابط واستخراج سكربتات Lua و Luau لمحبي البرمجة والتعديل</p>

        <div class="main-card">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="حط الرابط حقك هنا يا وحش..." autocomplete="off">
            </div>
            <button class="btn-action" id="actionBtn" onclick="processUrl()" disabled>فك الرابط الآن</button>

            <div class="loader-container" id="loader">
                <div class="loader-text">انتظر شوي… قاعدين نضبط الوضع ونفك الرابط</div>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">
                <span>◀ السكربت المستخرج (Luau / Lua):</span>
            </div>
            <div class="code-container">
                <pre id="codeOutput"></pre>
            </div>
            <button class="btn-copy" id="copyBtn" onclick="copyCode()">نسخ السكربت كامل</button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const actionBtn = document.getElementById('actionBtn');
        const loader = document.getElementById('loader');
        const resultSection = document.getElementById('resultSection');
        const codeOutput = document.getElementById('codeOutput');
        const copyBtn = document.getElementById('copyBtn');

        urlInput.addEventListener('input', () => {
            if (urlInput.value.trim() !== "") {
                actionBtn.disabled = false;
            } else {
                actionBtn.disabled = true;
            }
        });

        async function processUrl() {
            const targetUrl = urlInput.value.trim();
            if (!targetUrl) return;

            resultSection.style.display = "none";
            loader.style.display = "block";
            actionBtn.disabled = true;

            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                const fetchedText = data.contents;

                loader.style.display = "none";
                actionBtn.disabled = false;

                codeOutput.textContent = fetchedText;
                resultSection.style.display = "block";

            } catch (error) {
                loader.style.display = "none";
                actionBtn.disabled = false;
                codeOutput.textContent = "-- تعذر جلب البيانات من الرابط، تأكد أن الرابط يرجع نص خام (Raw) ومفتوح للكل.";
                resultSection.style.display = "block";
            }
        }

        function copyCode() {
            const textToCopy = codeOutput.textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = "تم النسخ بنجاح يا أسطورة! ✅";
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function scrollToBottom() {
            if (resultSection.style.display === "block") {
                copyBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                actionBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
